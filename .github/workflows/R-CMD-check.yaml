# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# for debugging help, https://github.com/r-lib/actions#where-to-find-help

# used by: stokes (canonical), freealg, permutations, frab, disordR, evitaicossa, clifford, spray, cmvnorm, jordan, magic, mvp, onion, weyl


name: R-CMD-check

on:
  workflow_call:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::tinytex
          needs: check

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Install LaTeX dependencies
        run: |
          tinytex::tlmgr_install(c("subfig", "wrapfig", "caption", "bbm", "bbm-macros", "amsfonts", "doublestroke", "wasysym", "wasy", "ms", "yfonts"))
        shell: Rscript {0}
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--compact-vignettes=both")'
        env:
          TINYTeX_AUTO_INSTALL: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: check-results
          path: check
